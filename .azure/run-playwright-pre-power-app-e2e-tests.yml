name: ${{ parameters.environment }}.${{ parameters.testTag }}.$(Build.SourceBranchName).$(Date:yyyyMMdd)$(Rev:.r)

trigger: none
pr: none

parameters:
  - name: testTag
    displayName: 'Test Tag'
    type: string
    default: 'Run-All-Tests'
    values:
      - 'Run-All-Tests'
      - 'Smoke'
      - 'Regression'
      - 'E2E'
      - 'Functional'
      - 'Visual'
      - 'Validation'
      - 'State-Management'
      - 'Accessibility'

  - name: environment
    displayName: 'Environment'
    type: string
    default: 'Dev'
    values:
      - 'Dev'
      - 'Stg'
      - 'Demo'

  - name: playwrightWorkers
    type: number
    default: 4

  - name: shardCount
    type: number
    default: 4

pool:
  name: 'hmcts-sds-ptl'

variables:
  - name: AZURE_SUBSCRIPTION
    value: 'DTS-SHAREDSERVICES-${{ upper(parameters.environment) }}-Pre-Recorded Evidence'
  - name: KEYVAULT_NAME
    value: 'pre-hmctskv-${{ lower(parameters.environment) }}'


# =========================================================
# STAGE 1: SHARDED EXECUTION
# =========================================================
stages:

- stage: Test
  displayName: Run Playwright Tests

  jobs:

  # =======================================================
  # STATIC MATRIX (SAFE IN AZURE DEVOPS)
  # =======================================================
  - job: Playwright
    displayName: Playwright Shards

    strategy:
      matrix:
        shard1:
          shardIndex: 1
        shard2:
          shardIndex: 2
        shard3:
          shardIndex: 3
        shard4:
          shardIndex: 4

    steps:

      - checkout: self

      - task: AzureKeyVault@2
        inputs:
          azureSubscription: 'DTS-SHAREDSERVICES-TEST-Pre-Recorded Evidence'
          KeyVaultName: 'pre-hmctskv-test'
          SecretsFilter: 'pre-level-1-test-login-email,pre-level-1-test-login-password,cvp-settings-base-url,cvp-conference-base-url,cvp-user-login-email,cvp-user-login-password,cvp-conference-user-email,cvp-service-id,cvp-location-code'
        displayName: Fetch Common Secrets

      - task: AzureKeyVault@2
        inputs:
          azureSubscription: ${{ variables.AZURE_SUBSCRIPTION }}
          KeyVaultName: ${{ variables.KEYVAULT_NAME }}
          SecretsFilter: 'pre-power-app-base-url,pre-api-url'
        displayName: Fetch Env Secrets

      - script: |
          yarn install
          yarn setup
          yarn playwright install msedge
        displayName: Install dependencies

      - script: |
          echo "Running shard $(shardIndex)/${{ parameters.shardCount }}"

          if [ "${{ parameters.testTag }}" = "Run-All-Tests" ]; then
            yarn playwright test playwright-e2e/tests/pre-power-app/ \
              --shard=$(shardIndex)/${{ parameters.shardCount }}
          else
            yarn playwright test playwright-e2e/tests/pre-power-app/ \
              --grep=@${{ lower(parameters.testTag) }} \
              --shard=$(shardIndex)/${{ parameters.shardCount }}
          fi
        displayName: Run Playwright Tests (sharded)
        env:
          CI: 'true'
          FUNCTIONAL_TESTS_WORKERS: ${{ parameters.playwrightWorkers }}

          PRE_POWER_APP_URL: $(pre-power-app-base-url)
          PRE_POWER_APP_API_URL: $(pre-api-url)
          PRE_LEVEL_1_USER_EMAIL: $(pre-level-1-test-login-email)
          PRE_LEVEL_1_USER_PASSWORD: $(pre-level-1-test-login-password)

          CVP_SETTINGS_BASE_URL: $(cvp-settings-base-url)
          CVP_CONFERENCE_BASE_URL: $(cvp-conference-base-url)
          CVP_USER_EMAIL: $(cvp-user-email)
          CVP_USER_PASSWORD: $(cvp-user-password)
          CVP_CONFERENCE_USER_EMAIL: $(cvp-conference-user-email)
          CVP_SERVICE_ID: $(cvp-service-id)
          CVP_LOCATION_CODE: $(cvp-location-code)

      - task: PublishPipelineArtifact@1
        condition: succeededOrFailed()
        inputs:
          targetPath: 'blob-report'
          artifact: 'blob-report-shard-$(System.JobPositionInPhase)'
        displayName: Publish Blob Report


# =========================================================
# STAGE 2: MERGE REPORTS
# =========================================================
- stage: Report
  displayName: Merge Playwright Reports
  dependsOn: Test
  condition: succeededOrFailed()

  jobs:

  - job: Merge
    displayName: Merge Reports

    steps:

      - checkout: self

      - script: |
          yarn install --immutable
        displayName: Install dependencies

      - task: DownloadPipelineArtifact@2
        inputs:
          path: $(Pipeline.Workspace)/blob-reports
        displayName: Download blob reports

      - script: |
          npx playwright merge-reports \
            --reporter html \
            $(Pipeline.Workspace)/blob-reports
        displayName: Merge reports

      - task: PublishPipelineArtifact@1
        inputs:
          targetPath: playwright-report
          artifact: PlaywrightHTMLReport
        displayName: Publish final report