name: Daily Playwright Tests - Staging Environment

trigger: none
pr: none

schedules:
  # Winter: Jan–Mar (Mon–Fri at 07:00 UTC = 07:00 UK) Monday to Friday
  - cron: "0 7 * 1-3 1-5"
    displayName: "Weekday 7AM Run (Winter UK Time - Jan to Mar)"
    branches:
      include:
        - master
    always: true

  # Summer: Apr–Oct (Mon–Fri at 06:00 UTC = 07:00 UK) Monday to Friday
  - cron: "0 6 * 4-10 1-5"
    displayName: "Weekday 7AM Run (Summer UK Time - Apr to Oct)"
    branches:
      include:
        - master
    always: true

  # Winter: Nov–Dec (Mon–Fri at 07:00 UTC = 07:00 UK) Monday to Friday
  - cron: "0 7 * 11-12 1-5"
    displayName: "Weekday 7AM Run (Winter UK Time - Nov to Dec)"
    branches:
      include:
        - master
    always: true

stages:
  # Step 1: one shared MS login; publish playwright-e2e/.sessions and .dynamic for all test jobs.
  - stage: Setup
    displayName: 'Shared setup'
    jobs:
      - template: templates/pre-power-app-stg-setup-job.yml

  # Step 2: cap pool usage at three concurrent test agents (wave 1).
  - stage: Tests_Wave1
    displayName: 'Tests wave 1'
    dependsOn: Setup
    jobs:
      - template: templates/pre-power-app-stg-test-job.yml
        parameters:
          jobName: Functional
          displayName: 'Functional (Edge)'
          testGrep: '@functional'
          playwrightProject: Pre-Power-App-Edge
          workers: '2'
          artifactName: PlaywrightHTMLReport-Functional

      - template: templates/pre-power-app-stg-test-job.yml
        parameters:
          jobName: Validation
          displayName: 'Validation (Edge)'
          testGrep: '@validation'
          playwrightProject: Pre-Power-App-Edge
          workers: '2'
          artifactName: PlaywrightHTMLReport-Validation

      - template: templates/pre-power-app-stg-test-job.yml
        parameters:
          jobName: StateManagement
          displayName: 'State Management (Edge)'
          testGrep: '@state-management'
          playwrightProject: Pre-Power-App-Edge
          workers: '2'
          artifactName: PlaywrightHTMLReport-StateManagement

  # Step 2: second wave keeps total concurrent agents at three on hmcts-sds-ptl.
  - stage: Tests_Wave2
    displayName: 'Tests wave 2'
    dependsOn: Tests_Wave1
    jobs:
      - template: templates/pre-power-app-stg-test-job.yml
        parameters:
          jobName: Accessibility
          displayName: 'Accessibility (Edge)'
          testGrep: '@accessibility'
          playwrightProject: Pre-Power-App-Edge
          workers: '2'
          artifactName: PlaywrightHTMLReport-Accessibility

      - template: templates/pre-power-app-stg-test-job.yml
        parameters:
          jobName: E2E
          displayName: 'E2E (Edge)'
          testGrep: '@e2e'
          playwrightProject: Pre-Power-App-Edge
          workers: '1'
          artifactName: PlaywrightHTMLReport-E2E

      - template: templates/pre-power-app-stg-test-job.yml
        parameters:
          jobName: Visual
          displayName: 'Visual (Chromium)'
          testGrep: '@visual'
          playwrightProject: Pre-Power-App-Chromium
          workers: '2'
          browserInstall: chromium
          artifactName: PlaywrightHTMLReport-Visual
