jobs:
  - job: PrePowerAppSetup
    displayName: 'Pre-Power-App session setup'
    pool:
      name: hmcts-sds-ptl
    steps:
      - checkout: self

      - task: AzureKeyVault@2
        inputs:
          azureSubscription: 'DTS-SHAREDSERVICES-TEST-Pre-Recorded Evidence'
          KeyVaultName: 'pre-hmctskv-test'
          SecretsFilter: 'pre-level-1-test-login-email,pre-level-1-test-login-password,cvp-settings-base-url,cvp-conference-base-url,cvp-user-login-email,cvp-user-login-password,cvp-conference-user-email,cvp-service-id,cvp-location-code'
        displayName: 'Fetch Common Secrets From Azure Key Vault'

      - task: AzureKeyVault@2
        inputs:
          azureSubscription: 'DTS-SHAREDSERVICES-STG-Pre-Recorded Evidence'
          KeyVaultName: 'pre-hmctskv-stg'
          SecretsFilter: 'pre-power-app-base-url,pre-api-url'
        displayName: 'Fetch Env Specific Secrets From Azure Key Vault'

      - task: Cache@2
        displayName: 'Cache Playwright browsers'
        inputs:
          key: 'playwright | "$(Agent.OS)" | yarn | $(Build.SourcesDirectory)/yarn.lock'
          path: $(HOME)/.cache/ms-playwright
          restoreKeys: |
            playwright | "$(Agent.OS)" | yarn

      - task: Cache@2
        displayName: 'Cache Yarn packages'
        inputs:
          key: 'yarn | "$(Agent.OS)" | $(Build.SourcesDirectory)/yarn.lock'
          path: $(Build.SourcesDirectory)/.yarn/cache
          restoreKeys: |
            yarn | "$(Agent.OS)"

      - script: |
          yarn install --immutable
          yarn playwright install --with-deps chromium msedge
        displayName: 'Install dependencies and Playwright browsers'

      - script: |
          yarn playwright test playwright-e2e/global-pre-power-app-setup.ts --project=pre-power-app-setup --workers=1
        displayName: 'Run shared Pre-Power-App setup (single MS login)'
        env:
          CI: 'true'
          FUNCTIONAL_TESTS_WORKERS: '1'
          PRE_POWER_APP_URL: $(pre-power-app-base-url)
          PRE_POWER_APP_API_URL: $(pre-api-url)
          PRE_LEVEL_1_USER_EMAIL: $(pre-level-1-test-login-email)
          PRE_LEVEL_1_USER_PASSWORD: $(pre-level-1-test-login-password)
          CVP_SETTINGS_BASE_URL: $(cvp-settings-base-url)
          CVP_CONFERENCE_BASE_URL: $(cvp-conference-base-url)
          CVP_USER_EMAIL: $(cvp-user-login-email)
          CVP_USER_PASSWORD: $(cvp-user-login-password)
          CVP_CONFERENCE_USER_EMAIL: $(cvp-conference-user-email)
          CVP_SERVICE_ID: $(cvp-service-id)
          CVP_LOCATION_CODE: $(cvp-location-code)

      - script: |
          if [ ! -d playwright-e2e/.sessions/powerApp ] || [ ! -d playwright-e2e/.dynamic/powerApp ]; then
            echo "Session files missing after setup. Searching workspace..."
            find . -type d \( -name '.sessions' -o -name '.dynamic' \) 2>/dev/null || true
            exit 1
          fi
          mkdir -p "$(Build.ArtifactStagingDirectory)/session-data/playwright-e2e"
          cp -r playwright-e2e/.sessions playwright-e2e/.dynamic "$(Build.ArtifactStagingDirectory)/session-data/playwright-e2e/"
        displayName: 'Stage session files for downstream jobs'

      - task: PublishPipelineArtifact@1
        inputs:
          targetPath: '$(Build.ArtifactStagingDirectory)/session-data'
          artifact: 'PrePowerAppSessions'
          publishLocation: 'pipeline'
        displayName: 'Publish session artifact for test jobs'
